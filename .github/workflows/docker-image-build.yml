name: Docker Image Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to build, for example v1.1.6"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    - name: 获取版本号
      id: get_version
      run: |
        RELEASE_TAG="${{ github.event.release.tag_name }}"
        INPUT_VERSION="${{ github.event.inputs.version }}"
        if [ -n "$RELEASE_TAG" ]; then
          VERSION="$RELEASE_TAG"
        elif [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        else
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo 'latest')
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        # 添加仓库名小写转换
        echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
    
    - name: 登录镜像仓库
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
        echo "${{ secrets.IMAGE_PASS }}" | docker login registry.cn-hangzhou.aliyuncs.com -u ${{ secrets.IMAGE_USER }} --password-stdin
    
    - name: 设置 Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 构建并推送到 GitHub/DockerHub
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          thingspanel/thingspanel-gmqtt:${{ env.VERSION }}
          ghcr.io/${{ env.OWNER_LC }}/thingspanel-gmqtt:${{ env.VERSION }}
          registry.cn-hangzhou.aliyuncs.com/thingspanel/thingspanel-gmqtt:${{ env.VERSION }}
